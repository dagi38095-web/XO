<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO – Play with a Friend</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --x-color: #ff4d6d;
    --o-color: #4cc9f0;
    --text: #f0f0f0;
    --muted: #666;
    --win-line: #ffe066;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(2rem, 8vw, 3.5rem);
    letter-spacing: -2px;
    margin-bottom: 6px;
  }
  h1 span.x { color: var(--x-color); }
  h1 span.o { color: var(--o-color); }

  .tagline {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 36px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Lobby ── */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.5px;
  }
  .btn:active { transform: scale(0.97); }

  .btn-create {
    background: var(--x-color);
    color: #fff;
  }
  .btn-join {
    background: var(--o-color);
    color: #0d0d0d;
  }
  .btn-rematch {
    background: var(--border);
    color: var(--text);
    margin-top: 8px;
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .divider {
    color: var(--muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .join-group {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  input {
    flex: 1;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--o-color); }
  input::placeholder { color: var(--muted); letter-spacing: 2px; }

  .join-btn {
    padding: 14px 18px;
    background: var(--o-color);
    border: none;
    border-radius: 10px;
    color: #0d0d0d;
    font-weight: 700;
    cursor: pointer;
    font-size: 1rem;
    transition: opacity 0.15s;
  }

  /* ── Room code display ── */
  #room-display {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }

  .room-label {
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .room-code {
    font-family: 'Space Mono', monospace;
    font-size: 2.2rem;
    letter-spacing: 8px;
    color: var(--x-color);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 24px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .room-code:hover { border-color: var(--x-color); }

  .copy-hint {
    color: var(--muted);
    font-size: 0.75rem;
  }

  .waiting-pulse {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .dot {
    width: 8px; height: 8px;
    background: var(--muted);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── Game ── */
  #game {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 360px;
  }

  .scoreboard {
    display: flex;
    justify-content: space-between;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .score-side {
    flex: 1;
    padding: 12px 16px;
    text-align: center;
  }
  .score-side.x-side { border-right: 1px solid var(--border); }

  .score-symbol {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .score-symbol.x { color: var(--x-color); }
  .score-symbol.o { color: var(--o-color); }

  .score-number {
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
  }

  .score-you {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .status-bar {
    font-size: 0.9rem;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
    transition: color 0.3s;
  }
  .status-bar.your-turn { color: var(--text); font-weight: 600; }

  /* ── Board ── */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
  }

  .cell {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: clamp(2rem, 10vw, 3rem);
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    user-select: none;
  }
  .cell:hover:not(.taken):not(.disabled) {
    background: #1e1e1e;
    border-color: #444;
    transform: scale(1.03);
  }
  .cell.taken { cursor: default; }
  .cell.disabled { cursor: not-allowed; }
  .cell.x-cell { color: var(--x-color); }
  .cell.o-cell { color: var(--o-color); }
  .cell.win-cell {
    background: #1a1600;
    border-color: var(--win-line);
    animation: pop 0.3s ease;
  }
  .cell.pop { animation: pop 0.2s ease; }

  @keyframes pop {
    0% { transform: scale(0.8); }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  #error-msg {
    color: var(--x-color);
    font-size: 0.85rem;
    text-align: center;
    min-height: 18px;
  }

  .your-symbol {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
  }
  .your-symbol strong { color: var(--text); }
</style>
</head>
<body>

<h1><span class="x">X</span> <span class="o">O</span></h1>
<p class="tagline">Play with a friend, anywhere</p>

<!-- LOBBY -->
<div id="lobby">
  <button class="btn btn-create" onclick="createRoom()">Create New Game</button>
  <div class="divider">— or join one —</div>
  <div class="join-group">
    <input type="text" id="code-input" maxlength="5" placeholder="CODE" />
    <button class="join-btn" onclick="joinRoom()">Join</button>
  </div>
  <div id="error-msg"></div>
</div>

<!-- WAITING FOR OPPONENT (after creating) -->
<div id="room-display">
  <div class="room-label">Share this code with your friend</div>
  <div class="room-code" id="room-code-text" onclick="copyCode()" title="Tap to copy"></div>
  <div class="copy-hint">Tap the code to copy it</div>
  <div class="waiting-pulse">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span>Waiting for opponent…</span>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="scoreboard">
    <div class="score-side x-side">
      <div class="score-symbol x">X</div>
      <div class="score-number" id="score-x">0</div>
      <div class="score-you" id="label-x">Player 1</div>
    </div>
    <div class="score-side o-side">
      <div class="score-symbol o">O</div>
      <div class="score-number" id="score-o">0</div>
      <div class="score-you" id="label-o">Player 2</div>
    </div>
  </div>

  <div class="your-symbol">You are <strong id="my-symbol-display"></strong></div>
  <div class="status-bar" id="status"></div>

  <div class="board" id="board"></div>

  <button class="btn btn-rematch" id="rematch-btn" style="display:none" onclick="requestRematch()">
    Play Again
  </button>
</div>

<script>
  // ── Replace this with your Render server URL after deploying ──
  const SERVER_URL = 'https://YOUR-APP-NAME.onrender.com';

  const socket = io(SERVER_URL);

  let mySymbol = '';
  let currentBoard = Array(9).fill(null);
  let gameActive = false;

  // ── UI helpers ──
  function show(id) { document.getElementById(id).style.display = 'flex'; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }
  function setStatus(msg, isYourTurn = false) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status-bar' + (isYourTurn ? ' your-turn' : '');
  }
  function setError(msg) { document.getElementById('error-msg').textContent = msg; }

  function copyCode() {
    const code = document.getElementById('room-code-text').textContent;
    navigator.clipboard.writeText(code).then(() => {
      document.querySelector('.copy-hint').textContent = 'Copied!';
      setTimeout(() => document.querySelector('.copy-hint').textContent = 'Tap the code to copy it', 2000);
    });
  }

  // ── Lobby actions ──
  function createRoom() { socket.emit('create-room'); }

  function joinRoom() {
    const code = document.getElementById('code-input').value.trim().toUpperCase();
    if (code.length < 3) { setError('Enter the room code.'); return; }
    setError('');
    socket.emit('join-room', code);
  }

  // ── Board rendering ──
  function renderBoard(board, winLine = []) {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    board.forEach((cell, i) => {
      const div = document.createElement('div');
      div.className = 'cell';
      if (cell) { div.classList.add('taken', cell === 'X' ? 'x-cell' : 'o-cell'); }
      if (!gameActive || cell) div.classList.add('disabled');
      if (winLine.includes(i)) div.classList.add('win-cell');
      div.textContent = cell || '';
      div.addEventListener('click', () => makeMove(i));
      boardEl.appendChild(div);
    });
  }

  function makeMove(index) {
    if (!gameActive) return;
    if (currentBoard[index]) return;
    socket.emit('make-move', index);
  }

  function updateScores(scores) {
    document.getElementById('score-x').textContent = scores.X;
    document.getElementById('score-o').textContent = scores.O;
  }

  function requestRematch() {
    document.getElementById('rematch-btn').disabled = true;
    document.getElementById('rematch-btn').textContent = 'Waiting for opponent…';
    socket.emit('rematch');
  }

  // ── Socket events ──
  socket.on('room-created', ({ roomCode, symbol }) => {
    mySymbol = symbol;
    hide('lobby');
    show('room-display');
    document.getElementById('room-code-text').textContent = roomCode;
  });

  socket.on('room-joined', ({ symbol }) => {
    mySymbol = symbol;
    hide('lobby');
  });

  socket.on('game-start', ({ board, currentTurn, scores }) => {
    hide('lobby');
    hide('room-display');
    show('game');
    document.getElementById('rematch-btn').style.display = 'none';
    document.getElementById('my-symbol-display').textContent = mySymbol;

    // Label "YOU" under the right score
    document.getElementById('label-x').textContent = mySymbol === 'X' ? 'You' : 'Opponent';
    document.getElementById('label-o').textContent = mySymbol === 'O' ? 'You' : 'Opponent';

    currentBoard = board;
    gameActive = true;
    updateScores(scores);
    renderBoard(board);
    const yourTurn = currentTurn === mySymbol;
    setStatus(yourTurn ? 'Your turn — tap a square' : "Opponent's turn…", yourTurn);
  });

  socket.on('board-update', ({ board, currentTurn }) => {
    currentBoard = board;
    renderBoard(board);
    const yourTurn = currentTurn === mySymbol;
    setStatus(yourTurn ? 'Your turn — tap a square' : "Opponent's turn…", yourTurn);
  });

  socket.on('game-over', ({ board, result, scores }) => {
    gameActive = false;
    currentBoard = board;
    const winLine = result.line || [];
    renderBoard(board, winLine);
    updateScores(scores);

    if (result.winner === 'draw') {
      setStatus("It's a draw!");
    } else if (result.winner === mySymbol) {
      setStatus('You win! 🎉', true);
    } else {
      setStatus('Opponent wins.');
    }

    const btn = document.getElementById('rematch-btn');
    btn.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Play Again';
  });

  socket.on('rematch-waiting', () => {
    setStatus('Waiting for opponent to accept…');
  });

  socket.on('player-left', () => {
    gameActive = false;
    setStatus('Opponent left the game.');
    document.getElementById('rematch-btn').style.display = 'none';
  });

  socket.on('error', (msg) => {
    setError(msg);
  });

  // Auto-uppercase room code input
  document.getElementById('code-input').addEventListener('input', function() {
    this.value = this.value.toUpperCase();
  });
  document.getElementById('code-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') joinRoom();
  });
</script>
</body>
</html>
